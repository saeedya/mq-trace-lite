services:
  ibm-mq:
    image: ibmcom/mq
    container_name: mq-dev
    ports:
      - "1414:1414"
      - "9443:9443"
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_APP_PASSWORD: ${MQ_APP_PASSWORD:-passw0rd}
    volumes:
      - mq-data:/mnt/mqm
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    container_name: mqtrace-app
    volumes:
      - ..:/app
    working_dir: /app
    depends_on:
      - ibm-mq
    environment:
      MQ_HOST: ibm-mq
      MQ_PORT: 1414
      MQ_CHANNEL: DEV.APP.SVRCONN
      MQ_QUEUE_MANAGER: QM1
    command: poetry run python -m mqtrace.cli.main --help

volumes:
  mq-data: